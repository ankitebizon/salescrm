name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          review_type: full
          custom_instructions: |
            Review this CRM codebase change for:
            1. Type safety and TypeScript correctness
            2. Supabase RLS - ensure organization_id scoping on all DB queries
            3. API route auth - every route must check session
            4. React Query cache invalidation after mutations
            5. Prisma query efficiency (N+1 queries, missing includes)
            6. Security - no sensitive data in client components
            Provide specific, actionable feedback with code examples.
